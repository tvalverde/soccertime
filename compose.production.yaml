services:
  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    depends_on:
      web:
        condition: service_healthy
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=10M,mode=1777
      - /var/cache/nginx:size=10M
      - /var/run:size=1M
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/tmp/soccertime-static:ro
      - ./media:/tmp/soccertime-media:ro
    restart: unless-stopped
    user: 1000:1000
    ports:
      - 8888:80
    networks:
      shared_network:
        ipv4_address: 10.42.42.20
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: .
    image: soccertime:latest
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=50M,mode=1777
      - /var/tmp/soccertime_cache:size=50M,mode=1777
    command: python -m uvicorn soccertime.asgi:application --host 0.0.0.0 --port 8000
    volumes:
      - ./:/code
    env_file:
      - .env.production
    user: 1000:1000
    ports:
      - 8910:8000
    networks:
      shared_network:
        ipv4_address: 10.42.42.21
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

networks:
  shared_network:
    external: true
