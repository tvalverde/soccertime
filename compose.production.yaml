services:
  soccertime-nginx:
    container_name: soccertime-nginx
    image: nginxinc/nginx-unprivileged:alpine
    env_file:
      - .env.production
    depends_on:
      soccertime-web:
        condition: service_healthy
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=10M,mode=1777
      - /var/cache/nginx:size=10M
      - /var/run:size=1M
    volumes:
      - soccertime-media:/usr/share/nginx/html/media:ro
      - soccertime-static:/usr/share/nginx/html/static:ro
    restart: unless-stopped
    user: 1000:1000
    networks:
      - nassut-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.soccertime-nginx.rule=${TRAEFIK_HOST_RULE} && (PathPrefix(`/soccertime/static`) || PathPrefix(`/soccertime/media`))"
      - "traefik.http.routers.soccertime-nginx.priority=2000"
      - "traefik.http.routers.soccertime-nginx.entrypoints=websecure"
      - "traefik.http.routers.soccertime-nginx.tls=true"
      - "traefik.http.routers.soccertime-nginx.middlewares=soccertime-nginx-strip-prefix"
      - "traefik.http.middlewares.soccertime-nginx-strip-prefix.stripprefix.prefixes=/soccertime"
      - "traefik.http.services.soccertime-nginx.loadbalancer.server.port=8080"

  soccertime-web:
    container_name: soccertime-web
    build:
      context: .
    image: soccertime:latest
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # read_only: true
    tmpfs:
      - /tmp:size=50M,mode=1777
      - /var/tmp/soccertime_cache:size=50M,mode=1777
    command: python -m uvicorn soccertime.asgi:application --host 0.0.0.0 --port 8000 --root-path /soccertime
    volumes:
      - soccertime-db:/code/db:rw
      - soccertime-media:/code/media:rw
      - soccertime-static:/code/static:rw
      - /home/toni/shared:/shared:ro
    env_file:
      - .env.production
    user: 1000:1000
    networks:
      - nassut-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.soccertime-app.rule=${TRAEFIK_HOST_RULE} && PathPrefix(`/soccertime`)"
      - "traefik.http.routers.soccertime-app.priority=1000"
      - "traefik.http.routers.soccertime-app.entrypoints=websecure"
      - "traefik.http.routers.soccertime-app.tls=true"
      - "traefik.http.routers.soccertime-app.tls.certresolver=resolver-http"
      - "traefik.http.routers.soccertime-app.middlewares=soccertime-app-strip-prefix"
      - "traefik.http.middlewares.soccertime-app-strip-prefix.stripprefix.prefixes=/soccertime"
      - "traefik.http.services.soccertime-app-service.loadbalancer.server.port=8000"
      - "traefik.http.routers.soccertime-app.service=soccertime-app-service"

volumes:
  soccertime-media:
  soccertime-static:
  soccertime-db:
