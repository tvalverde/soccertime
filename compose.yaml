services:
  web:
    build: .
    image: soccertime:latest
    command: python -m manage runserver 0.0.0.0:8000
    restart: unless-stopped
    user: 1000:1000
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - .:/code
    ports:
      - 8000:8000
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
